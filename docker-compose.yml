# 段先生 v17.0 Docker Compose — 完整部署栈
# 包含：段先生主服务 + Redis 缓存 + 向量数据库 + Nginx 反向代理

version: '3.8'

services:
  # ===== 段先生主服务 =====
  duan-agent:
    build:
      context: .
      dockerfile: Dockerfile
    image: duan-xiansheng:v17.0
    container_name: duan-agent
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-3000}:3000"
      - "${API_PORT:-8080}:8080"
    environment:
      - NODE_ENV=production
      - DEFAULT_MODEL_PROVIDER=${DEFAULT_MODEL_PROVIDER:-doubao}
      - DEFAULT_MODEL=${DEFAULT_MODEL:-doubao-seed-2.0-lite}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - AZURE_SPEECH_KEY=${AZURE_SPEECH_KEY:-}
      - AZURE_SPEECH_REGION=${AZURE_SPEECH_REGION:-eastasia}
      - HA_BASE_URL=${HA_BASE_URL:-}
      - HA_TOKEN=${HA_TOKEN:-}
      - MIHOME_SID=${MIHOME_SID:-}
      - MQTT_BROKER=${MQTT_BROKER:-}
      - REDIS_URL=redis://redis:6379
      - VECTOR_DB_URL=http://qdrant:6333
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - duan-data:/app/.duan
      - duan-logs:/app/logs
      - ./skills:/app/skills:ro
    depends_on:
      - redis
      - qdrant
    networks:
      - duan-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8080/api/v1/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ===== Redis 缓存（会话/工具结果缓存） =====
  redis:
    image: redis:7-alpine
    container_name: duan-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - duan-network

  # ===== Qdrant 向量数据库（语义记忆） =====
  qdrant:
    image: qdrant/qdrant:latest
    container_name: duan-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - duan-network

  # ===== Nginx 反向代理（可选） =====
  nginx:
    image: nginx:alpine
    container_name: duan-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - duan-agent
    networks:
      - duan-network
    profiles:
      - full

volumes:
  duan-data:
  duan-logs:
  redis-data:
  qdrant-data:

networks:
  duan-network:
    driver: bridge
